name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run SystemController tests
        run: |
          g++ -DUNIT_TEST -I./tests/ -I./ tests/test_system_controller.cpp SystemController.cpp OTAHandler.cpp tests/PMSensorMock.cpp tests/DHTSensorMock.cpp tests/OLEDDisplayMock.cpp tests/RGBLEDHandlerMock.cpp tests/WiFiHandlerMock.cpp tests/BlynkHandlerMock.cpp tests/ButtonHandlerMock.cpp tests/SoftwareSerial.cpp -o tests/sc_runner
          ./tests/sc_runner
      - name: Compile and run PMSensor tests
        run: |
          g++ -I./tests/ -I./ tests/test_pm_sensor.cpp PMSensor.cpp tests/SoftwareSerial.cpp -o tests/pm_runner
          ./tests/pm_runner
      - name: Compile and run ButtonHandler tests
        run: |
          g++ -I./tests/ -I./ tests/test_button.cpp -o tests/button_runner
          ./tests/button_runner

  arduino-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install ESP8266 platform
        run: |
          arduino-cli core update-index --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core install esp8266:esp8266 --additional-urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
      - name: Install Libraries
        run: |
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "Blynk"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit NeoPixel"
          arduino-cli lib install "ESP8266-ping"
          arduino-cli lib install "ArduinoJson"
      - name: Compile
        run: |
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 aether.ino
