name: Robust Arduino CLI OTA Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with 'v' (e.g., v2.5)

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Arduino CLI and Tools
        uses: arduino/setup-arduino-cli@v2 

      - name: 🔌 Install Core and Dependencies
        run: |
          echo "Installing ESP8266 core and external libraries..."
          
          # 1. Install ESP8266 core
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          
          # 2. Install all required external libraries
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Blynk"
          arduino-cli lib install "ESP8266-ping" 
          
      - name: ⚙️ Compile Firmware and Prepare Asset
        id: compile
        run: |
          FQBN="esp8266:esp8266:nodemcuv2"
          SKETCH_NAME="airmon.ino" 
          
          echo "Compiling sketch: $SKETCH_NAME with FQBN: $FQBN"

          # Final Compile
          arduino-cli compile --fqbn $FQBN $SKETCH_NAME
          
          # CRITICAL FIX: Find the compiled binary file by searching the entire current workspace
          BIN_FILE_PATH=$(find . -type f -name "$SKETCH_NAME.bin" | head -1)

          if [ -z "$BIN_FILE_PATH" ]; then
            echo "Error: Compiled binary not found in expected paths. Check build output structure."
            exit 1
          fi
          
          echo "Found binary at: $BIN_FILE_PATH"

          # Copy and rename the binary to the required asset name: firmware.bin
          cp "$BIN_FILE_PATH" ./firmware.bin
          
          # Output the tag name for the release step
          TAG_NAME=$(git describe --tags --abbrev=0)
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./firmware.bin:firmware.bin 
          tag_name: ${{ steps.compile.outputs.tag_name }}
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
