name: Arduino OTA Release (Fixed)

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with 'v'

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Arduino CLI
        # This step installs the command-line interface
        uses: arduino/setup-arduino-cli@v2 

      - name: 🔌 Install ESP8266 Core
        run: |
          # 1. Add the ESP8266 board manager URL
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          # 2. Update the board index
          arduino-cli core update-index
          # 3. Install the ESP8266 core
          arduino-cli core install esp8266:esp8266
          
      - name: ⚙️ Compile Firmware
        id: compile
        run: |
          # NOTE: 
          # FQBN is for NodeMCU 1.0 (ESP-12E Module)
          FQBN="esp8266:esp8266:nodemcuv2"
          
          # ⚠️ Update this line with the EXACT name of your main .ino file ⚠️
          SKETCH_NAME="airmon.ino" 
          
          # Compile the sketch
          arduino-cli compile --fqbn $FQBN $SKETCH_NAME
          
          # Find the compiled binary and rename it to firmware.bin
          # This search is more robust than relying on /tmp path
          BUILD_DIR=$(find . -name "$SKETCH_NAME.bin" | head -1 | xargs dirname)
          if [ -z "$BUILD_DIR" ]; then
            echo "Error: Compiled binary not found."
            exit 1
          fi
          
          cp "$BUILD_DIR/$SKETCH_NAME.bin" ./firmware.bin
          
          # Output the final path for the next step
          echo "bin_path=./firmware.bin" >> $GITHUB_OUTPUT

      - name: 📤 Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./firmware.bin:firmware.bin 
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
