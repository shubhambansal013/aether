name: Robust Arduino CLI OTA Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with 'v' (e.g., v2.0)

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Arduino CLI and Tools
        uses: arduino/setup-arduino-cli@v2 

      - name: 🔌 Install Core and Dependencies
        run: |
          echo "Installing ESP8266 core and external libraries..."
          
          # 1. Install ESP8266 core
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          
          # 2. Install all required external libraries from aqi_monitor.ino and OTAHandler.cpp
          # This explicitly solves the "No such file or directory" errors (WiFiManager, Pinger, ArduinoJson, Blynk)
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "Pinger"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Blynk"
          
      - name: ⚙️ Compile Firmware and Prepare Asset
        id: compile
        run: |
          FQBN="esp8266:esp8266:nodemcuv2"
          SKETCH_NAME="aqi_monitor.ino" 
          
          echo "Compiling sketch: $SKETCH_NAME with FQBN: $FQBN"

          # Final Compile
          arduino-cli compile --fqbn $FQBN $SKETCH_NAME
          
          # Find the compiled binary file (e.g., /tmp/.../aqi_monitor.ino.bin)
          BUILD_DIR=$(find . -name "$SKETCH_NAME.bin" | head -1 | xargs dirname)
          if [ -z "$BUILD_DIR" ]; then 
            echo "Error: Compiled binary not found after build."
            exit 1
          fi
          
          # Copy and rename the binary to the required asset name: firmware.bin
          cp "$BUILD_DIR/$SKETCH_NAME.bin" ./firmware.bin
          
          # Output the tag name for the release step
          TAG_NAME=$(git describe --tags --abbrev=0)
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          # Uploads the compiled ./firmware.bin file and names the asset 'firmware.bin'
          files: ./firmware.bin:firmware.bin 
          tag_name: ${{ steps.compile.outputs.tag_name }}
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
