name: Build and Release OTA Firmware

on:
  push:
    branches:
      - main

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: 🔌 Install ESP8266 Core and Libraries
        run: |
          arduino-cli config add board_manager.additional_urls https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266
          arduino-cli lib install "WiFiManager"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Blynk"
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit NeoPixel"
          arduino-cli lib install "ESP8266-ping"

      - name: ⚙️ Update Version in Config.h
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          sed -i "s/static const char\* FIRMWARE_VERSION = \".*\";/static const char\* FIRMWARE_VERSION = \"$SHORT_SHA\";/" Config.h

      - name: 🔨 Compile Firmware
        run: |
          mkdir -p build
          arduino-cli compile --fqbn esp8266:esp8266:nodemcuv2 --build-path build aether.ino
          cp build/aether.ino.bin firmware.bin

      - name: 📄 Generate version.json
        run: |
          echo "{\"version\": \"${{ env.SHORT_SHA }}\", \"url\": \"https://github.com/shubhambansal013/aether/releases/download/latest/firmware.bin\"}" > version.json

      - name: 📤 Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware.bin
            version.json
          tag_name: latest
          name: Latest OTA Release
          body: |
            Automated OTA build from main branch.
            Firmware Version (Git SHA): ${{ env.SHORT_SHA }}
          prerelease: false
          draft: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
